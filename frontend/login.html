<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | FormBuilder AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <div class="glass-card">
            <h2 class="gradient-text" style="text-align: center; margin-bottom: 2rem;">Login</h2>
            <div class="form-element" style="flex-direction: column; align-items: stretch; gap: 1rem; background: transparent; border: none; padding: 0;">
                <input type="email" id="email" class="input-basic" placeholder="Email address" required>
                <input type="password" id="password" class="input-basic" placeholder="Password" required>
                <button id="btn-login" class="btn btn-primary" style="justify-content: center; margin-top: 1rem;">Sign In</button>
                <p class="text-muted" style="text-align: center; margin-top: 1rem;">Don't have an account? <a href="register.html" style="color: var(--primary);">Register</a></p>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
