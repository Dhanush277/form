<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | FormBuilder AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <div class="glass-card">
            <h2 class="gradient-text" style="text-align: center; margin-bottom: 2rem;">Register</h2>
            <div class="form-element" style="flex-direction: column; align-items: stretch; gap: 1rem; background: transparent; border: none; padding: 0;">
                <input type="text" id="name" class="input-basic" placeholder="Full Name" required>
                <input type="email" id="email" class="input-basic" placeholder="Email address" required>
                <input type="password" id="password" class="input-basic" placeholder="Password" required>
                <button id="btn-register" class="btn btn-primary" style="justify-content: center; margin-top: 1rem;">Create Account</button>
                <p class="text-muted" style="text-align: center; margin-top: 1rem;">Already have an account? <a href="login.html" style="color: var(--primary);">Login</a></p>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
