<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | FormBuilder AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h1 class="gradient-text">Form Analytics</h1>
                <p class="text-muted" id="form-title">Loading...</p>
            </div>
            <div style="display: flex; gap: 1rem;">
                <a href="index.html" class="btn btn-secondary">Back</a>
                <button id="btn-export" class="btn btn-primary">Export to PDF</button>
            </div>
        </header>

        <div id="analytics-content">
            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <h3>Total Responses</h3>
                    <p id="stat-responses">0</p>
                </div>
                <div class="glass-card stat-card">
                    <h3>Avg. ML Confidence</h3>
                    <p id="stat-confidence">0%</p>
                </div>
            </div>

            <div class="glass-card" style="margin-bottom: 2rem;">
                <h3 style="margin-bottom: 1rem;">ML Predictions (Completion Analysis)</h3>
                <div style="height: 250px; display: flex; justify-content: center;">
                    <canvas id="predictionChart"></canvas>
                </div>
            </div>
            
            <div class="glass-card">
                <h3 style="margin-bottom: 1rem;">Recent Responses</h3>
                <div id="responses-list" style="max-height: 400px; overflow-y: auto;">
                    <p class="text-muted">Loading responses...</p>
                </div>
            </div>
        </div>
    </div>
    <script src="js/analytics.js"></script>
</body>
</html>
